<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questionnaire Mwa$ia</title>

<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; color: #333; }
.container { max-width:400px; margin:auto; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; margin-top:15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

p { font-weight:bold; margin-bottom: 5px; }

.btn {
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  font-size:16px;
  background:#ddd;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn.active {
  background:#1a4d2e;
  color:white;
  transform:scale(1.02);
}

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  margin-bottom: 10px;
  border: 1px solid #ccc;
  border-radius: 5px;
  box-sizing: border-box;
}

.submit {
  background:black;
  color:white;
  margin-top:15px;
  font-weight: bold;
}

.submit:disabled {
  background: #666;
}

.result {
  background:#e8f5e9;
  padding:15px;
  margin-top:20px;
  border-radius:10px;
}

.wa-btn {
  display: block;
  background: #25D366;
  color: white;
  padding: 12px;
  text-align: center;
  border-radius: 8px;
  text-decoration: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
<h2>⚡ Questionnaire rapide</h2>

<div class="card">

<p>0. Quel est ton numéro WhatsApp ?</p>
<input id="phone" type="tel">

<p>1. Combien d’enfants as-tu ?</p>
<input id="nb_enfants" type="number">

<p>2. Quelle est ta situation ?</p>
<button class="btn" onclick="select(this,'situation','celibataire')">Célibataire</button>
<button class="btn" onclick="select(this,'situation','couple')">En couple</button>
<button class="btn" onclick="select(this,'situation','mariee')">Mariée</button>

<p>3. T’occupes-tu du foyer ?</p>
<button class="btn" onclick="select(this,'foyer',true)">Oui</button>
<button class="btn" onclick="select(this,'foyer',false)">Non</button>

<p>4. Dépenses hebdo (FCFA)</p>
<input id="depense" type="number">

<p>5. Fréquence marché</p>
<input id="frequence_marche" type="number">

<p>6. As-tu une activité ?</p>
<button class="btn" onclick="select(this,'activite',true)">Oui</button>
<button class="btn" onclick="select(this,'activite',false)">Non</button>

<p>7. Blocage</p>
<button class="btn" onclick="select(this,'blocage','argent')">Argent</button>
<button class="btn" onclick="select(this,'blocage','temps')">Temps</button>
<button class="btn" onclick="select(this,'blocage','idee')">Idée</button>

<p>8. Si capital ?</p>
<button class="btn" onclick="select(this,'capital',true)">Oui</button>
<button class="btn" onclick="select(this,'capital',false)">Non</button>

<p>9. Budget</p>
<button class="btn" onclick="select(this,'budget','20-50')">20-50k</button>
<button class="btn" onclick="select(this,'budget','50-100')">50-100k</button>

<p>10. Intérêt</p>
<button class="btn" onclick="select(this,'interet',true)">Oui</button>
<button class="btn" onclick="select(this,'interet',false)">Non</button>

<button id="submit-btn" class="btn submit" onclick="send()">Analyser</button>

<div id="result"></div>

</div>
</div>

<script>

let data = {}

function select(el,key,val){
  el.parentNode.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"))
  el.classList.add("active")
  data[key]=val
}

async function send(){

  data.phone = document.getElementById("phone").value
  data.nb_enfants = parseInt(document.getElementById("nb_enfants").value||0)
  data.depense = parseInt(document.getElementById("depense").value||0)
  data.frequence_marche = parseInt(document.getElementById("frequence_marche").value||0)

  const required = ['phone','situation','foyer','activite','blocage','capital','budget','interet']
  if(required.some(k=>data[k]===undefined)){
    alert("Remplis tout")
    return
  }

  document.getElementById("submit-btn").innerText="Analyse..."
  
  const res = await fetch("https://script.google.com/macros/s/AKfycbzBypsZKo08xsVdCLLjjKC29zjy1ijymj-rxb4bHl-Rl_AKVHqlN_hqSmbV5ybJdiV36Q/exec",{
    method:"POST",
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(data)
  })

  const r = await res.json()

  let wa = `https://wa.me/229XXXXXXXX?text=Je suis prête 🚀`

  document.getElementById("result").innerHTML = `
    <div class="result">
    Score: ${r.score}<br>
    Profil: ${r.profil}<br>
    ${r.profil==="PRETE" ? `<a href="${wa}" class="wa-btn">WhatsApp</a>`:""}
    </div>
  `

}

</script>

</body>
</html>
